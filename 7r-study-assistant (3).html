<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7R Study Assistant</title>

<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --card: #1a1e2a;
    --border: #252a38;
    --accent: #c8a84b;
    --accent2: #5b8dee;
    --accent3: #e05c7a;
    --text: #e8eaf0;
    --muted: #7a8099;
    --success: #4caf82;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(200,168,75,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(91,141,238,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 32px;
    padding: 32px 0 24px;
    border-bottom: 1px solid var(--border);
  }

  .header-label {
    font-family: 'Courier New', Courier, monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  header h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(28px, 6vw, 44px);
    font-weight: 900;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--accent) 0%, #e8d5a3 50%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--muted);
    font-size: 13px;
    margin-top: 8px;
    font-weight: 300;
  }

  /* Setup Panel */
  .setup-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .setup-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 180px;
  }

  .field label {
    font-family: 'Courier New', Courier, monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .field select, .field input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .field select:focus, .field input:focus {
    border-color: var(--accent);
  }

  .field select option {
    background: var(--surface);
  }

  .btn-start {
    background: linear-gradient(135deg, var(--accent), #e8c96a);
    color: #0d0f14;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn-start:hover { transform: translateY(-1px); opacity: 0.92; }
  .btn-start:active { transform: translateY(0); }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Steps Nav */
  .steps-nav {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    padding: 4px 0 12px;
    margin-bottom: 20px;
    scrollbar-width: none;
  }
  .steps-nav::-webkit-scrollbar { display: none; }

  .step-btn {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Courier New', Courier, monospace;
    font-size: 11px;
    padding: 8px 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .step-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0f14;
    font-weight: 500;
  }

  .step-btn.done {
    border-color: var(--success);
    color: var(--success);
  }

  .step-btn .r-num {
    font-weight: 700;
    font-size: 13px;
  }

  /* Content Card */
  .content-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    min-height: 300px;
  }

  .card-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .r-badge {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 20px;
    font-weight: 900;
    flex-shrink: 0;
  }

  .card-title-block h2 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 20px;
    font-weight: 700;
  }

  .card-title-block p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .card-body {
    padding: 24px;
  }

  /* Prompt for steps that need input */
  .step-description {
    background: var(--surface);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .btn-generate {
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 10px;
    padding: 12px 24px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-generate:hover {
    background: var(--accent);
    color: #0d0f14;
  }

  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

  /* AI Response */
  .ai-response {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-top: 16px;
    font-size: 14px;
    line-height: 1.8;
    white-space: pre-wrap;
    display: none;
  }

  .ai-response.visible { display: block; animation: fadeIn 0.3s ease; }

  .ai-response h3 { 
    font-family: Georgia, 'Times New Roman', serif;
    color: var(--accent);
    margin: 16px 0 8px;
    font-size: 16px;
  }

  .ai-response h3:first-child { margin-top: 0; }

  .ai-response strong { color: var(--accent2); }

  .ai-response em { color: var(--accent); font-style: normal; font-weight: 500; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Loading */
  .loading {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 16px 0;
    color: var(--muted);
    font-size: 13px;
  }

  .loading.visible { display: flex; }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Quiz specific */
  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 12px;
  }

  .quiz-opt {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
    text-align: left;
    color: var(--text);
  }

  .quiz-opt:hover { border-color: var(--accent2); color: var(--accent2); }
  .quiz-opt.correct { border-color: var(--success); background: rgba(76,175,130,0.1); color: var(--success); }
  .quiz-opt.wrong { border-color: var(--accent3); background: rgba(224,92,122,0.1); color: var(--accent3); }

  /* User text area */
  .user-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    padding: 14px;
    outline: none;
    resize: vertical;
    min-height: 100px;
    margin-top: 12px;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  .user-textarea:focus { border-color: var(--accent2); }

  /* Navigation */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .btn-nav {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    padding: 10px 20px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-nav:hover { border-color: var(--text); color: var(--text); }
  .btn-nav.primary { border-color: var(--accent2); color: var(--accent2); }
  .btn-nav.primary:hover { background: var(--accent2); color: #0d0f14; }
  .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Hidden / shown */
  .hidden { display: none !important; }

  /* Step colors */
  .s1 { background: rgba(200,168,75,0.15); color: var(--accent); }
  .s2 { background: rgba(91,141,238,0.15); color: var(--accent2); }
  .s3 { background: rgba(224,92,122,0.15); color: var(--accent3); }
  .s4 { background: rgba(76,175,130,0.15); color: var(--success); }
  .s5 { background: rgba(180,120,255,0.15); color: #b47cff; }
  .s6 { background: rgba(255,160,80,0.15); color: #ffa050; }
  .s7 { background: rgba(80,200,220,0.15); color: #50c8dc; }

  .welcome {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .welcome .big-7 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 80px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0.3;
    line-height: 1;
    margin-bottom: 16px;
  }

  .welcome p { font-size: 14px; line-height: 1.7; max-width: 400px; margin: 0 auto; }

  /* Formatted response styling */
  .ai-response ul, .ai-response ol {
    padding-left: 20px;
    margin: 8px 0;
  }

  .ai-response li { margin: 4px 0; }

  .tag {
    display: inline-block;
    background: rgba(200,168,75,0.15);
    color: var(--accent);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    font-family: 'Courier New', Courier, monospace;
    margin-right: 4px;
  }

  /* Progress bar */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-label">Dr. Adamola Adeyeye's Framework</div>
    <h1>7R Study Assistant</h1>
    <p>AI-powered clinical learning — Paediatrics · O&G · Psychiatry</p>
    <p style="margin-top:6px; font-family:'Courier New',monospace; font-size:11px; color:var(--accent); letter-spacing:1px;">by Ohijei Aide</p>
  </header>

  <!-- Setup -->
  <div class="setup-panel">
    <div class="setup-row">
      <div class="field">
        <label>Subject</label>
        <select id="subjectSelect">
          <option value="">— Select subject —</option>
          <option value="Paediatrics">Paediatrics</option>
          <option value="Obstetrics & Gynaecology">Obstetrics & Gynaecology</option>
          <option value="Psychiatry">Psychiatry</option>
        </select>
      </div>
      <div class="field">
        <label>Topic</label>
        <input type="text" id="topicInput" placeholder="e.g. Severe Malaria, Preeclampsia, Schizophrenia…" />
      </div>
      <button class="btn-start" id="startBtn" onclick="startSession()">Begin 7R →</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar hidden" id="progressBar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>

  <!-- Steps Nav -->
  <div class="steps-nav hidden" id="stepsNav">
    <button class="step-btn" id="sBtn0" onclick="goToStep(0)"><span class="r-num">1R</span> Read</button>
    <button class="step-btn" id="sBtn1" onclick="goToStep(1)"><span class="r-num">2R</span> Research</button>
    <button class="step-btn" id="sBtn2" onclick="goToStep(2)"><span class="r-num">3R</span> Reason</button>
    <button class="step-btn" id="sBtn3" onclick="goToStep(3)"><span class="r-num">4R</span> Remember</button>
    <button class="step-btn" id="sBtn4" onclick="goToStep(4)"><span class="r-num">5R</span> Rehearse</button>
    <button class="step-btn" id="sBtn5" onclick="goToStep(5)"><span class="r-num">6R</span> Relate</button>
    <button class="step-btn" id="sBtn6" onclick="goToStep(6)"><span class="r-num">7R</span> Reproduce</button>
  </div>

  <!-- Content Card -->
  <div class="content-card" id="contentCard">
    <div class="welcome">
      <div class="big-7">7R</div>
      <p>Select a subject and topic above, then begin your session. The AI will guide you through all 7 steps of Dr. Adeyeye's framework.</p>
    </div>
  </div>

</div>

<script>
const STEPS = [
  {
    r: "1R", name: "Read", color: "s1",
    desc: "Paste your lecture notes below. AI will distill them into a concise, exam-focused summary — pulling out what matters most for finals.",
    btnLabel: "Summarise My Notes",
    hasNotesInput: true,
    prompt: (subj, topic, notes) => notes && notes.trim().length > 30
      ? `You are a medical education expert helping a 600-level MBBS student in Nigeria studying ${subj}. The topic is: "${topic}".

The student has provided their ACTUAL LECTURE NOTES below. Your job is to distill these notes — not replace them — into an exam-focused summary that captures exactly what their lecturer emphasized.

LECTURE NOTES:
"""
${notes}
"""

Based ONLY on these notes, generate:

### Overview
[2-3 sentence definition/overview drawn from the notes]

### Key Facts (Exam Bullets)
[8-12 high-yield facts from the notes — bold critical values, numbers, and terms the lecturer stressed]

### Classification / Types
[If present in the notes — reproduce accurately]

### Pathophysiology (Core Mechanism)
[As per the notes — 3-5 sentences max]

### Key Investigations
[From the notes — with expected findings]

### Management Principles
[From the notes — stepwise]

### What Your Lecturer Emphasised
[Pick out 3-4 things that appear to be stressed or repeated in these notes — these are likely exam targets]

Stay faithful to the notes. If something important seems missing, flag it briefly at the end.`
      : `You are a medical education expert helping a 600-level MBBS student in Nigeria studying ${subj}. The topic is: "${topic}".

No lecture notes were provided. Generate a CONCISE, EXAM-FOCUSED core reading summary:

### Overview
[2-3 sentence definition/overview]

### Key Facts (Exam Bullets)
[8-12 high-yield facts — bold critical values, numbers, and terms]

### Classification / Types
[If applicable]

### Pathophysiology (Core Mechanism)
[3-5 sentences max]

### Key Investigations
[List with expected findings]

### Management Principles
[Stepwise, concise]

### Note
Flag that this is a general summary, not based on their specific lecture notes. Encourage them to paste their notes for a more targeted summary.`
  },
  {
    r: "2R", name: "Research", color: "s2",
    desc: "AI will suggest the best alternate resources — textbooks, mnemonics sources, and study angles — to deepen your understanding.",
    btnLabel: "Get Resource Recommendations",
    prompt: (subj, topic) => `You are advising a Nigerian 600-level MBBS student studying ${subj}, topic: "${topic}".

Suggest the best ALTERNATE RESOURCES to complement their core reading. Include:

### Recommended Textbooks
[3-5 specific books with chapters/pages where possible — include Nigerian-relevant texts like Llewellyn-Jones, Forfar, etc.]

### Online Resources
[3-5 specific resources — UpToDate topics, Osmosis videos, Geeky Medics, etc. with what to look for]

### Unique Angles to Research
[3-4 perspectives they may have missed — e.g. complications, controversies, Nigerian/tropical context]

### What Nigerian Exams Focus On
[Specific exam-hotspot sub-topics for MBBS finals in this area]

Be specific and practical.`
  },
  {
    r: "3R", name: "Reason & Reflect", color: "s3",
    desc: "AI will ask you deep reflection questions. Think through each one — the more you reason, the better you retain.",
    btnLabel: "Generate Reflection Questions",
    prompt: (subj, topic) => `You are a clinical tutor for a Nigerian 600-level MBBS student studying ${subj}, topic: "${topic}".

Generate 6 DEEP REFLECTION QUESTIONS that push the student to reason — not just recall. These should require synthesis, comparison, or application of knowledge.

Format:
### Reflection Questions

**Q1:** [Question that asks WHY something happens mechanistically]
*Think about:* [A prompt to guide their reasoning]

**Q2:** [Question comparing two related conditions or approaches]
*Think about:* [Hint]

**Q3:** [Question about a clinical decision they would need to make]
*Think about:* [Hint]

**Q4:** [Question about a complication or edge case]
*Think about:* [Hint]

**Q5:** [Question connecting to a related topic]
*Think about:* [Hint]

**Q6:** [Question about what they would tell a patient/parent — communication angle]
*Think about:* [Hint]

Then add:
### Key Concepts to Consolidate
[3-4 concepts they should now feel solid on]`
  },
  {
    r: "4R", name: "Remember", color: "s4",
    desc: "AI will generate mnemonics, acronyms, allegories and memory codes tailored specifically to your topic.",
    btnLabel: "Generate Mnemonics & Memory Tools",
    prompt: (subj, topic) => `You are a medical mnemonics expert helping a Nigerian 600-level MBBS student remember "${topic}" in ${subj}.

Create a RICH SET of memory tools:

### Primary Mnemonic
[Create 1-2 memorable acronyms/mnemonics for the most important list — e.g. causes, features, management steps. Show the expansion clearly.]

### Story/Allegory
[A short memorable story or visual allegory that encodes key facts — make it vivid, even slightly absurd, so it sticks]

### Number Codes
[Any important numbers, values, thresholds — with a hook to remember each]

### Pattern Recognition Tricks
[2-3 "whenever you see X, think Y" clinical pattern tricks]

### Comparison Shortcut
[If relevant — a table or shortcut comparing this with a commonly confused condition]

### Quick Recall Dump
[A 10-second "brain dump" sequence the student can recite — like a rapid mental checklist]

Make these genuinely clever and memorable, not generic.`
  },
  {
    r: "5R", name: "Rehearse", color: "s5",
    desc: "Test yourself! AI will generate MCQs and a teach-back exercise to rehearse what you've learned.",
    btnLabel: "Generate Rehearsal Quiz",
    prompt: (subj, topic) => `You are writing a rehearsal quiz for a Nigerian 600-level MBBS student on "${topic}" in ${subj}.

Generate 5 HIGH-QUALITY MCQs in this EXACT JSON format inside a <QUIZ> tag:

<QUIZ>
[
  {
    "q": "Question text here?",
    "opts": ["A. Option 1", "B. Option 2", "C. Option 3", "D. Option 4"],
    "ans": "A",
    "exp": "Brief explanation of why A is correct and why others are wrong"
  }
]
</QUIZ>

Then after the quiz tag, add:

### Teach-Back Challenge
Imagine you must explain "${topic}" to a junior student in 2 minutes. Write 3 key points you would cover and why you chose those specific 3 points over all others.

Make the MCQs exam-realistic — at least 2 should be clinical scenario-based.`
  },
  {
    r: "6R", name: "Relate", color: "s6",
    desc: "AI will give you a real clinical scenario to apply your knowledge — just like a ward round or OSCE.",
    btnLabel: "Generate Clinical Scenario",
    prompt: (subj, topic) => `You are a clinical tutor presenting a real-life scenario to a Nigerian 600-level MBBS student on "${topic}" in ${subj}.

Create a VIVID, REALISTIC clinical case:

### The Scenario
[Write a detailed ward/clinic presentation — patient name (Nigerian name), age, presenting complaint, history, vitals, exam findings. Make it feel real, not textbook. 3-5 sentences.]

### Your Tasks
Present 5 structured tasks the student must work through:
1. [Most likely diagnosis and differential diagnoses]
2. [Immediate investigations you would order and why]
3. [Immediate management steps — prioritized]
4. [A specific complication that then develops — what do you do now?]
5. [Communication task — what do you tell the family/patient?]

### Key Learning Points from This Case
[3-4 teaching points this scenario illustrates]

### Real-World Pearls
[2-3 practical "in the real ward" tips a registrar would tell a student]`
  },
  {
    r: "7R", name: "Reproduce", color: "s7",
    desc: "Final exam simulation. AI will give you an exam question — write your answer, then get instant feedback.",
    btnLabel: "Generate Exam Question",
    prompt: (subj, topic) => `You are a MBBS finals examiner writing a question on "${topic}" in ${subj} for a Nigerian medical school.

Generate ONE COMPLETE exam question set:

### SAQ / Essay Question
[Write a structured 20-mark question with 4-5 sub-parts labeled (a), (b), (c), (d) — realistic MBBS finals style. Each part should have a mark allocation.]

### Model Answer (Mark Scheme)
[Provide the model answer for each part with the key points that earn marks — formatted as a mark scheme]

### Examiner's Note
[What are the most common mistakes students make on this topic in finals? What does a distinction-level answer include that a pass-level answer misses?]

### Final Checklist
[5-point checklist: can the student confidently say YES to each of these about "${topic}"?]`
  }
];

let currentStep = 0;
let completedSteps = new Set();
let sessionActive = false;
let subject = '';
let topic = '';
let quizData = null;
let quizAnswered = {};

function startSession() {
  subject = document.getElementById('subjectSelect').value;
  topic = document.getElementById('topicInput').value.trim();

  if (!subject || !topic) {
    alert('Please select a subject and enter a topic.');
    return;
  }

  sessionActive = true;
  completedSteps = new Set();
  currentStep = 0;
  quizAnswered = {};

  document.getElementById('stepsNav').classList.remove('hidden');
  document.getElementById('progressBar').classList.remove('hidden');

  renderStep(0);
  updateNav();
}

function goToStep(i) {
  currentStep = i;
  renderStep(i);
  updateNav();
}

function renderStep(i) {
  const step = STEPS[i];
  const card = document.getElementById('contentCard');

  const notesField = step.hasNotesInput ? `
    <div style="margin-bottom:16px">
      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <button onclick="switchInputTab('paste')" id="tabPaste"
          style="flex:1; padding:9px; border-radius:8px; border:1px solid var(--accent); background:var(--accent); color:#0d0f14; font-family:'Courier New',monospace; font-size:11px; letter-spacing:1px; cursor:pointer;">
          ✏️ Paste Text
        </button>
        <button onclick="switchInputTab('upload')" id="tabUpload"
          style="flex:1; padding:9px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'Courier New',monospace; font-size:11px; letter-spacing:1px; cursor:pointer;">
          📎 Upload File
        </button>
      </div>
      <div id="panelPaste">
        <textarea id="lectureNotes" class="user-textarea"
          placeholder="Paste your lecture notes here. The AI will summarise YOUR material. Leave blank for a general summary."
          style="min-height:140px"></textarea>
      </div>
      <div id="panelUpload" style="display:none;">
        <label id="uploadLabel"
          style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
                 border:2px dashed var(--border); border-radius:12px; padding:28px 16px; cursor:pointer; text-align:center;">
          <span style="font-size:28px">📂</span>
          <span style="font-family:'Courier New',monospace; font-size:12px; color:var(--accent)">Tap to choose file</span>
          <span style="font-size:11px; color:var(--muted)">Images (JPG, PNG) or PDF — slides, photos, screenshots</span>
          <input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none" onchange="handleFileSelect(this)">
        </label>
        <div id="filePreview" style="display:none; margin-top:10px; padding:12px 14px; background:var(--surface); border-radius:10px; border:1px solid var(--border); font-size:13px; align-items:center; gap:10px;">
          <span id="fileIcon" style="font-size:20px">📄</span>
          <div style="flex:1; overflow:hidden;">
            <div id="fileName" style="font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
            <div id="fileSize" style="font-size:11px; color:var(--muted); margin-top:2px;"></div>
          </div>
          <button onclick="clearFile()" style="background:transparent; border:none; color:var(--accent3); font-size:16px; cursor:pointer;">✕</button>
        </div>
      </div>
    </div>` : '';

  card.innerHTML = `
    <div class="card-header">
      <div class="r-badge ${step.color}">${step.r}</div>
      <div class="card-title-block">
        <h2>${step.name}</h2>
        <p>${subject} · ${topic}</p>
      </div>
    </div>
    <div class="card-body">
      <div class="step-description">${step.desc}</div>
      ${notesField}
      <button class="btn-generate" id="genBtn" onclick="generateContent(${i})">
        <span id="genBtnIcon">⚡</span> ${step.btnLabel}
      </button>
      <div class="loading" id="loadingDiv">
        <div class="spinner"></div>
        <span>Generating with AI…</span>
      </div>
      <div class="ai-response" id="aiResponse"></div>
      <div class="nav-row">
        <button class="btn-nav" onclick="goToStep(${i-1})" ${i === 0 ? 'disabled' : ''}>← Previous</button>
        <span style="font-family: 'Courier New', Courier, monospace; font-size: 11px; color: var(--muted)">${i+1} / 7</span>
        <button class="btn-nav primary" onclick="goToStep(${i+1})" ${i === 6 ? 'disabled' : ''}>Next →</button>
      </div>
    </div>
  `;
}

async function generateContent(stepIndex) {
  const step = STEPS[stepIndex];
  const genBtn = document.getElementById('genBtn');
  const loading = document.getElementById('loadingDiv');
  const aiResp = document.getElementById('aiResponse');

  genBtn.disabled = true;
  loading.classList.add('visible');
  aiResp.classList.remove('visible');

  try {
    let messages;
    if (stepIndex === 0) {
      const activeTab = document.getElementById('tabUpload')?.style.background === 'var(--accent)' ? 'upload' : 'paste';
      if (activeTab === 'upload' && uploadedFileData) {
        // Vision / PDF mode
        const isImage = uploadedFileType.startsWith('image/');
        const contentArr = isImage
          ? [
              { type: "image", source: { type: "base64", media_type: uploadedFileType, data: uploadedFileData } },
              { type: "text", text: step.prompt(subject, topic, '') + "\n\nThe lecture material is provided as the image above. Extract and summarise from it." }
            ]
          : [
              { type: "document", source: { type: "base64", media_type: "application/pdf", data: uploadedFileData } },
              { type: "text", text: step.prompt(subject, topic, '') + "\n\nThe lecture material is provided as the PDF above. Extract and summarise from it." }
            ];
        messages = [{ role: "user", content: contentArr }];
      } else {
        const notes = document.getElementById('lectureNotes')?.value || '';
        messages = [{ role: "user", content: step.prompt(subject, topic, notes) }];
      }
    } else {
      messages = [{ role: "user", content: step.prompt(subject, topic) }];
    }
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: messages
      })
    });

    const data = await response.json();
    const text = data.content.map(b => b.text || '').join('');

    loading.classList.remove('visible');

    if (stepIndex === 4) {
      // Quiz step — parse JSON
      renderQuiz(text, aiResp);
    } else {
      aiResp.innerHTML = formatMarkdown(text);
      aiResp.classList.add('visible');
    }

    completedSteps.add(stepIndex);
    updateNav();
    document.getElementById('genBtn').textContent = '↺ Regenerate';
    document.getElementById('genBtn').disabled = false;

  } catch (err) {
    loading.classList.remove('visible');
    aiResp.innerHTML = `<span style="color:var(--accent3)">Error generating content. Please try again.</span>`;
    aiResp.classList.add('visible');
    genBtn.disabled = false;
  }
}

function renderQuiz(text, container) {
  const match = text.match(/<QUIZ>([\s\S]*?)<\/QUIZ>/);
  const afterQuiz = text.replace(/<QUIZ>[\s\S]*?<\/QUIZ>/, '').trim();

  if (!match) {
    container.innerHTML = formatMarkdown(text);
    container.classList.add('visible');
    return;
  }

  try {
    const questions = JSON.parse(match[1].trim());
    quizData = questions;
    quizAnswered = {};

    let html = '<div style="margin-bottom:20px">';
    questions.forEach((q, qi) => {
      html += `<div style="margin-bottom:20px; padding-bottom:20px; border-bottom: 1px solid var(--border)">`;
      html += `<p style="font-weight:500; margin-bottom:8px; font-size:14px"><span class="tag">Q${qi+1}</span> ${q.q}</p>`;
      html += `<div class="quiz-options">`;
      q.opts.forEach((opt, oi) => {
        html += `<button class="quiz-opt" id="opt_${qi}_${oi}" onclick="checkAnswer(${qi}, ${oi}, '${q.ans}', \`${q.exp.replace(/`/g,"'")}\`)">${opt}</button>`;
      });
      html += `</div>`;
      html += `<div id="exp_${qi}" style="display:none; margin-top:8px; font-size:13px; color:var(--muted); background:var(--surface); padding:10px 14px; border-radius:8px; line-height:1.6"></div>`;
      html += `</div>`;
    });
    html += '</div>';

    if (afterQuiz) {
      html += `<div style="margin-top:12px">${formatMarkdown(afterQuiz)}</div>`;
    }

    html += `<div style="margin-top:16px; padding:14px; background:var(--surface); border-radius:10px; font-family:'Courier New',monospace; font-size:12px; color:var(--muted)">
      Score: <span id="quizScore" style="color:var(--accent); font-weight:700">0</span> / ${questions.length}
    </div>`;

    container.innerHTML = html;
    container.classList.add('visible');
  } catch {
    container.innerHTML = formatMarkdown(text);
    container.classList.add('visible');
  }
}

function checkAnswer(qi, oi, correct, explanation) {
  if (quizAnswered[qi] !== undefined) return;
  quizAnswered[qi] = oi;

  const correctIdx = correct.charCodeAt(0) - 65;
  const opts = document.querySelectorAll(`[id^="opt_${qi}_"]`);

  opts.forEach((btn, i) => {
    btn.disabled = true;
    if (i === correctIdx) btn.classList.add('correct');
    else if (i === oi) btn.classList.add('wrong');
  });

  const expDiv = document.getElementById(`exp_${qi}`);
  expDiv.style.display = 'block';
  expDiv.textContent = explanation;

  // Update score
  const correct_answers = Object.entries(quizAnswered).filter(([k, v]) => {
    return v === (quizData[k].ans.charCodeAt(0) - 65);
  }).length;
  const scoreEl = document.getElementById('quizScore');
  if (scoreEl) scoreEl.textContent = correct_answers;
}

function updateNav() {
  for (let i = 0; i < 7; i++) {
    const btn = document.getElementById(`sBtn${i}`);
    btn.className = 'step-btn';
    if (i === currentStep) btn.classList.add('active');
    else if (completedSteps.has(i)) btn.classList.add('done');
  }

  const pct = ((completedSteps.size) / 7) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
}

function formatMarkdown(text) {
  return text
    .replace(/### (.+)/g, '<h3>$1</h3>')
    .replace(/## (.+)/g, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
    .replace(/^\d+\. (.+)/gm, '<li>$1</li>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

// ---- File upload helpers ----
let uploadedFileData = null;
let uploadedFileType = null;

function switchInputTab(tab) {
  const paste = document.getElementById('panelPaste');
  const upload = document.getElementById('panelUpload');
  const tPaste = document.getElementById('tabPaste');
  const tUpload = document.getElementById('tabUpload');
  if (!paste || !upload) return;
  if (tab === 'paste') {
    paste.style.display = 'block';
    upload.style.display = 'none';
    tPaste.style.background = 'var(--accent)';
    tPaste.style.color = '#0d0f14';
    tPaste.style.borderColor = 'var(--accent)';
    tUpload.style.background = 'transparent';
    tUpload.style.color = 'var(--muted)';
    tUpload.style.borderColor = 'var(--border)';
  } else {
    paste.style.display = 'none';
    upload.style.display = 'block';
    tUpload.style.background = 'var(--accent)';
    tUpload.style.color = '#0d0f14';
    tUpload.style.borderColor = 'var(--accent)';
    tPaste.style.background = 'transparent';
    tPaste.style.color = 'var(--muted)';
    tPaste.style.borderColor = 'var(--border)';
  }
}

function handleFileSelect(input) {
  const file = input.files[0];
  if (!file) return;
  const maxMB = 5;
  if (file.size > maxMB * 1024 * 1024) {
    alert('File too large. Please use a file under 5MB.');
    return;
  }
  uploadedFileType = file.type;
  const reader = new FileReader();
  reader.onload = e => {
    uploadedFileData = e.target.result.split(',')[1];
    const preview = document.getElementById('filePreview');
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileSize').textContent = (file.size / 1024).toFixed(1) + ' KB';
    document.getElementById('fileIcon').textContent = file.type.startsWith('image/') ? '🖼️' : '📄';
    preview.style.display = 'flex';
    document.getElementById('uploadLabel').style.borderColor = 'var(--accent)';
  };
  reader.readAsDataURL(file);
}

function clearFile() {
  uploadedFileData = null;
  uploadedFileType = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('filePreview').style.display = 'none';
  document.getElementById('uploadLabel').style.borderColor = 'var(--border)';
}

</script>
